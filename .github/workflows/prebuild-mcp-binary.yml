name: Prebuild MCP binary

# Keeps a ready-to-run `calm` binary committed at .calm-bin/x86_64-unknown-linux-musl/calm
# (via Git LFS) so scripts/mcp-launcher.sh has it the instant a fresh clone
# happens — no compile, no download, no tagged-release requirement. This is
# what closes the Claude-Code-on-the-web cold-start race that a Setup
# Script/SessionStart hook can only race, never structurally win — see
# docs/cloud-environment-setup.md.
#
# `paths:` is an allow-list, so this only fires when something that can
# actually change the built binary changed — Rust source, workspace deps,
# or the workflow itself. That's also what keeps it from retriggering on
# its own commit back to main (.calm-bin/** was never in the list, so no
# separate paths-ignore is needed for that).
#
# CORRECTION (2026-07-12): this used to be an unrestricted `push` trigger
# with only `paths-ignore: ['.calm-bin/**']`, so *every* push to main —
# docs, config, unrelated crates outside this workspace, anything — ran a
# full `cross build --release` and re-committed/re-fetched a ~103MB LFS
# blob. Combined with CI and the nightly SCIP overlay workflow also doing
# `lfs: true` checkouts on every push/PR, this repo burned through its
# GitHub account's Git LFS bandwidth budget (see the LFS-budget-exceeded
# outage this same day: `git lfs fetch` failing repo-wide with "This
# repository exceeded its LFS budget" across three separate workflows).
# Narrowing the trigger doesn't undo that, but stops it recurring.
on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/prebuild-mcp-binary.yml'

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: x86_64-unknown-linux-musl-prebuild

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --bin calm --target x86_64-unknown-linux-musl

      - name: Commit prebuilt binary
        run: |
          mkdir -p .calm-bin/x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/calm .calm-bin/x86_64-unknown-linux-musl/calm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .calm-bin/x86_64-unknown-linux-musl/calm
          if git diff --cached --quiet; then
            echo "Binary unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "chore(calm-bin): update prebuilt calm binary for $(git rev-parse --short HEAD)"
          git push
